# VCU Encoder Configuration File Example
# This is a sample configuration file for the VCU encoder

[INPUT]
# Input video dimensions and format
Width = 1920
Height = 1080
Framerate = 30
YUVFile = input.yuv
# Input format: NV12, I420, UYVY, etc.
Format = NV12

[OUTPUT]
# Output bitstream file
BitstreamFile = output.h264

[SETTINGS]
# Profile and Level
# AVC profiles: AVC_BASELINE, AVC_MAIN, AVC_HIGH, etc.
# HEVC profiles: HEVC_MAIN, HEVC_MAIN10, etc.
Profile = HEVC_MAIN
Level = 5.1

# Tier: MAIN_TIER or HIGH_TIER (HEVC only)
Tier = MAIN_TIER

# Entropy coding mode: MODE_CABAC (default) or MODE_CAVLC (AVC only)
EntropyMode = MODE_CABAC

# Enable filler data for CBR mode
EnableFillerData = DISABLE

# Bitdepth: 8, 10, or 12
BitDepth = 8

[RATE_CONTROL]
# Rate control mode: CONST_QP, CBR, VBR, CAPPED_VBR, LOW_LATENCY
RateCtrlMode = CBR

# Target bitrate in kbits per second
# Examples: 5000 (5 Mbps), 10000 (10 Mbps)
Bitrate = 5000

# Maximum bitrate in kbits per second (for VBR mode)
MaxBitrate = 10000

# CPB (Coded Picture Buffer) size in seconds
CPBSize = 2.0

# Initial delay in seconds (must be <= CPBSize)
InitialDelay = 1.0

# Maximum PSNR quality target for CAPPED_VBR mode (range 20.0-50.0 dB)
# MaxPSNR = 42.0

# Enable frame skipping when target bitrate cannot be reached
EnableSkip = DISABLE

# Maximum consecutive skipped frames
MaxConsecutiveSkip = 0

# Frame rate for rate control (can differ from input frame rate)
Framerate = 30

[GOP]
# GOP (Group of Pictures) settings

# GOP control mode: DEFAULT_GOP, DEFAULT_GOP_B, PYRAMIDAL_GOP, PYRAMIDAL_GOP_B,
#                   LOW_DELAY_P, LOW_DELAY_B, ADAPTIVE_GOP
GopCtrlMode = DEFAULT_GOP

# GOP length (distance between I-frames)
Gop.Length = 60

# Number of B-frames between reference frames
Gop.NumB = 2

# GDR (Gradual Decoder Refresh) mode: DISABLE, GDR_HORIZONTAL, GDR_VERTICAL
Gop.GdrMode = DISABLE

# Enable Long-Term Reference Picture (LTRP) feature
Gop.EnableLT = DISABLE

# Long-term reference picture refresh frequency in frames
Gop.FreqLT = 0

# Minimum frames between IDR pictures (DISABLE or >= 0)
Gop.FreqIDR = DISABLE

[PICTURE]
# Picture-level encoding settings

# Number of slices per frame
NumSlices = 1

# Enable dependent slices
DependentSlice = false

# Enable loop filter (deblocking)
LoopFilter = true

# Enable SAO (Sample Adaptive Offset) - HEVC only
EnableSAO = true

# Enable transform skip - HEVC only
EnableTransformSkip = false

# Chroma mode: CHROMA_4_0_0, CHROMA_4_2_0, CHROMA_4_2_2, CHROMA_4_4_4
ChromaMode = CHROMA_4_2_0

[ADVANCED]
# Advanced encoding options

# Scaling list mode: DEFAULT, FLAT, CUSTOM
ScalingList = DEFAULT

# Enable adaptive motion vector prediction
AdaptiveMVP = true

# Enable weighted prediction
WeightedPred = false

# Enable temporal motion vector predictor
TemporalMVP = true

# Enable constrained intra prediction
ConstrainedIntra = false

# Search range for motion estimation
SearchRange = 64

# Enable multi-pass encoding
MultiPass = false

# Subframe latency mode
SubframeLatency = false

# Number of cores to use (0 = auto)
NumCore = 0

[MOTION_VECTOR]
# Global Motion Vector settings (if supported)
# Specify motion compensation for a specific frame

# Frame index to apply motion vector (-1 = disabled)
FrameIndex = -1

# Global motion vector X component
GMVectorX = 0

# Global motion vector Y component
GMVectorY = 0
